<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Connexion - DJ-hub</title>
    <meta name="description" content="Connectez-vous à votre espace DJ-hub artiste ou admin.">
    <link rel="stylesheet" href="assets/css/style.css?v=djhub-final">
  </head>
  <body data-page="login">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="Accueil DJ-hub"><span class="brand-mark">DJ</span><span>DJ-hub</span></a>
      <nav class="site-nav" id="site-nav" aria-label="Navigation principale">
        <a href="index.html">Retour au site</a>
        <a href="inscription-artiste.html">Créer un compte artiste</a>
      </nav>
    </header>

    <main>
      <section class="page-hero">
        <div class="container form-layout">
          <form class="app-form auth-form reveal" id="login-form">
            <p class="eyebrow">Connexion</p>
            <h1>Me connecter</h1>
            <div class="form-grid">
              <div class="full"><label for="login-email">Email</label><input id="login-email" name="email" type="email" autocomplete="email" required></div>
              <div class="full"><label for="login-password">Mot de passe</label><input id="login-password" name="password" type="password" autocomplete="current-password" required></div>
            </div>
            <div class="form-feedback auth-message" id="auth-message" hidden></div>
            <button class="btn btn-primary btn-full" type="submit">Me connecter</button>
            <p><a class="text-link" href="inscription-artiste.html">Créer un compte artiste</a> · <a class="text-link" href="index.html">Retour au site</a></p>
          </form>

          <aside class="side-panel reveal">
            <p class="eyebrow">Espace sécurisé</p>
            <h2>Accès artiste et admin</h2>
            <p>Les artistes gèrent leur profil, leur validation et leurs disponibilités. Les admins valident les profils depuis l’espace dédié.</p>
          </aside>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabase-config.js?v=djhub-final"></script>
    <script src="assets/js/auth.js?v=djhub-final"></script>
    <script src="assets/js/main.js?v=djhub-final"></script>
  </body>
</html>
